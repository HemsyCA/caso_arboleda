<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Recarga Celular — Banco Arboleda</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f0f4f0; margin: 0; }
    .header { background: #2e7d32; color: white; padding: 20px 30px; }
    .form-box { max-width: 420px; margin: 40px auto; background: white;
                padding: 30px; border-radius: 10px; box-shadow: 0 2px 8px #ccc; }
    label { display: block; margin: 14px 0 5px; font-weight: bold; }
    input, select { width: 100%; padding: 10px; border: 1px solid #ccc;
                    border-radius: 5px; font-size: 15px; box-sizing: border-box; }
    .btn-submit { margin-top: 20px; width: 100%; padding: 14px;
                  background: #2e7d32; color: white; border: none;
                  border-radius: 8px; font-size: 16px; cursor: pointer; }
    .btn-submit:hover { background: #1b5e20; }
    #mensaje { margin-top: 20px; padding: 15px; border-radius: 8px;
               text-align: center; display: none; }
    .exito { background: #e8f5e9; color: #2e7d32; border: 1px solid #2e7d32; }
    .error { background: #ffebee; color: #c62828; border: 1px solid #c62828; }
  </style>
</head>
<body>
  <div class="header">
    <a href="index.html" style="color:white; text-decoration:none;">← Volver</a>
    <h2 style="margin:5px 0">📱 Recarga Celular</h2>
  </div>
  <div class="form-box">
    <label>Paso 1 — Número de celular</label>
    <input type="text" id="numero" placeholder="Ej: 999888777" maxlength="9">

    <label>Paso 2 — Operador</label>
    <select id="operador">
      <option value="">-- Seleccione --</option>
      <option>Claro</option>
      <option>Movistar</option>
      <option>Entel</option>
      <option>Bitel</option>
    </select>

    <label>Paso 3 — Monto a recargar (S/.)</label>
    <select id="monto">
      <option value="">-- Seleccione --</option>
      <option value="5">S/. 5</option>
      <option value="10">S/. 10</option>
      <option value="20">S/. 20</option>
      <option value="50">S/. 50</option>
    </select>

    <label>Paso 4 — Clave online</label>
    <input type="password" id="clave" placeholder="Ingrese su clave">

    <button class="btn-submit" onclick="realizarRecarga()">✅ Confirmar Recarga</button>

    <div id="mensaje"></div>
  </div>

  <script>
    async function realizarRecarga() {
      const numero = document.getElementById('numero').value.trim();
      const operador = document.getElementById('operador').value;
      const monto = document.getElementById('monto').value;
      const clave = document.getElementById('clave').value;
      const msg = document.getElementById('mensaje');

      if (!numero || !operador || !monto || !clave) {
        msg.className = 'error';
        msg.innerText = '⚠️ Por favor complete todos los campos.';
        msg.style.display = 'block';
        return;
      }

      try {
        const response = await fetch('http://localhost:8080/api/recarga', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ numeroCelular: numero, operador, monto })
        });
        const data = await response.json();
        msg.className = response.ok ? 'exito' : 'error';
        msg.innerText = (response.ok ? '✅ ' : '❌ ') + data.mensaje;
        msg.style.display = 'block';
      } catch (e) {
        msg.className = 'error';
        msg.innerText = '❌ Error al conectar. ¿Está corriendo el backend?';
        msg.style.display = 'block';
      }
    }
  </script>
</body>
</html>
