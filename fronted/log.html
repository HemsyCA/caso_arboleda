<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Banco Arboleda - Ingreso</title>
<style>
body{font-family:Arial;background:#f0f4f0;margin:0;display:flex;height:100vh;align-items:center;justify-content:center}
.box{max-width:380px;width:90%;background:#fff;padding:35px;border-radius:10px;box-shadow:0 2px 8px #ccc;text-align:center}
.box h2{color:#2e7d32;margin-bottom:5px}
label{display:block;text-align:left;margin:14px 0 5px;font-weight:bold}
input{width:100%;padding:10px;border:1px solid #ccc;border-radius:5px;box-sizing:border-box}
button{margin-top:20px;width:100%;padding:14px;background:#2e7d32;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:16px}
#msg{color:#c62828;margin-top:10px;display:none}
</style>
</head>
<body>
<div class="box">
  <h2>🌳 Banco Arboleda</h2>
  <p>Ingrese sus credenciales</p>
  <label>Usuario</label>
  <input type="text" id="usuario" placeholder="Ingrese su usuario">
  <label>Contraseña</label>
  <input type="password" id="clave" placeholder="Ingrese su contraseña">
  <button onclick="login()">Ingresar</button>
  <div id="msg">Complete ambos campos.</div>
</div>
<script>
async function login(){
  const usuario = document.getElementById('usuario').value.trim();
  const clave = document.getElementById('clave').value.trim();
  const msg = document.getElementById('msg');

  if(!usuario || !clave){ 
    msg.innerText='Complete ambos campos.';
    msg.style.display='block'; 
    return; 
  }

  try {
    const r = await fetch('http://localhost:8080/api/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ usuario, clave })
    });
    if (r.ok) {
      location.href = 'index.html';
    } else {
      const data = await r.json();
      msg.innerText = data.mensaje;
      msg.style.display = 'block';
    }
  } catch(e) {
    msg.innerText = 'Error al conectar con el servidor.';
    msg.style.display = 'block';
  }
}
</script>
</body>
</html>
